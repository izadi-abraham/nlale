app = "nlale-api"
primary_region = "ams"

[build]

[env]
  PORT = "3000"
  DB_PATH = "/data/gallery.db"
  UPLOADS_DIR = "/data/uploads"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "nlale_data"
  destination = "/data"
