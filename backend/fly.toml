# fly.toml app configuration file generated for nlale-api on 2026-04-11T06:38:57+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nlale-api'
primary_region = 'ams'

[build]

[env]
  DB_PATH = '/data/gallery.db'
  PORT = '3000'
  UPLOADS_DIR = '/data/uploads'

[[mounts]]
  source = 'nlale_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
